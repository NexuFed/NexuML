format_version: 2
backend: tensor_shards
writer: tensor_shards
num_samples: 70000
label_names:
- digit
num_classes:
  digit: 10
modality: audio
x_keys:
- features
- sample_index
y_keys:
- digit
label_prefix: label__
feature_shapes:
  features:
  - 1
  - 28
  - 28
  sample_index: []
  label__digit: []
key_specs:
